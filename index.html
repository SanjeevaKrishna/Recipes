<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Recipes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #fff8f0;
    }
    h1 { color: #c0392b; }
    p  { color: #555; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s;
      display: block;
    }
    .card:hover { transform: translateY(-4px); }

    .card-emoji { font-size: 40px; }
    .card-title { font-size: 18px; font-weight: bold; margin: 10px 0 6px; }
    .card-desc  { font-size: 14px; color: #888; }
  </style>
</head>
<body>

  <h1>🍴 Simple Recipes</h1>
  <p>Click any recipe to see the full instructions.</p>

  <div class="cards">

    <a class="card" href="pages/pasta.html">
      <div class="card-emoji">🍝</div>
      <div class="card-title">Pasta</div>
      <div class="card-desc">Quick and easy pasta for beginners</div>
    </a>

     <a class="card" href="pages/Pizza.html">
      <div class="card-emoji">🍳</div>
      <div class="card-title">Pizza</div>
      <div class="card-desc">Perfect Tasty Pizzza every time</div>
    </a>

    <a class="card" href="pages/Omelette.html">
      <div class="card-emoji">🍳</div>
      <div class="card-title">Omelette</div>
      <div class="card-desc">Perfect fluffy omelette every time</div>
    </a>

    <a class="card" href="pages/salad.html">
      <div class="card-emoji">🥗</div>
      <div class="card-title">Salad</div>
      <div class="card-desc">Fresh and healthy garden salad</div>
    </a>

  </div>

</body>
</html>
